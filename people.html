<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recipe Builder + Ingredients Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 30px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      font-size: 14px;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      padding: 6px 12px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      margin: 8px 0;
      font-size: 16px;
    }

    #servingsValue {
      font-size: 18px;
      margin: 0 10px;
      font-weight: bold;
    }

    hr {
      margin: 15px 0;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Recipe Builder</h2>

  <!-- إدخال اسم الوصفة -->
  <input type="text" id="recipeName" placeholder="Recipe name">

  <!-- إدخال المكونات -->
  <textarea id="ingredientsInput" placeholder="Enter ingredients (one per line)
Example:
rice
eggs
chicken"></textarea>

  <button onclick="addRecipe()">Add Recipe</button>

  <hr>

  <h3>Servings</h3>

  <div>
    <button onclick="changeServings(-1)">➖</button>
    <span id="servingsValue">2</span>
    <button onclick="changeServings(1)">➕</button>
  </div>

  <ul id="ingredients"></ul>
</div>

<script>
  const baseServings = 2;
  let currentServings = 2;

  // هنخزن المكونات اللي المستخدم بيدخلها
  let ingredients = [];

  // إضافة وصفة جديدة
  function addRecipe() {
    const input = document.getElementById("ingredientsInput").value;

    if (input.trim() === "") return;

    const lines = input.split("\n");

    ingredients = lines.map(line => {
      return {
        name: line.trim(),
        amount: 1
      };
    });

    updateIngredients(currentServings);
  }

  // تحديث المكونات حسب عدد الأشخاص
  function updateIngredients(servings) {
    const list = document.getElementById("ingredients");
    list.innerHTML = "";

    ingredients.forEach(item => {
      let newAmount = (item.amount * servings) / baseServings;

      newAmount = Math.round(newAmount * 100) / 100;

      list.innerHTML += `<li>${newAmount} ${item.name}</li>`;
    });
  }

  // تغيير عدد الأشخاص
  function changeServings(change) {
    currentServings += change;

    if (currentServings < 1) currentServings = 1;

    document.getElementById("servingsValue").innerText = currentServings;

    updateIngredients(currentServings);
  }

  // تشغيل أولي
  updateIngredients(currentServings);
</script>

</body>
</html>
